services:
  atd:
    build:
      context: .
    image: trixie-slim:uv-nvm
    container_name: atd
    working_dir: /root/atd
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - QT_X11_NO_MITSHM=1
    volumes:
      - .:/root/atd
      - /tmp/.X11-unix:/tmp/.X11-unix
    network_mode: host
    ipc: host
    tty: true

  atd-gpu:
    extends:
      service: atd
    container_name: atd-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - gpu